<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle d'acces — Centre de Fitness Raguilio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            padding: 1rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: clamp(1rem, 4vh, 2rem);
        }

        .logo-container img {
            height: clamp(56px, 12vw, 80px);
            border-radius: 50%;
        }

        .scan-box {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: clamp(1.25rem, 7vw, 3rem);
            text-align: center;
            width: min(500px, 100%);
            transition: all 0.3s;
        }

        .scan-icon {
            font-size: clamp(3rem, 14vw, 5rem);
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }

        #qr_input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .result-box {
            margin-top: clamp(1rem, 4vh, 2rem);
            width: min(500px, 100%);
            border-radius: 20px;
            padding: clamp(1.25rem, 6vw, 2rem);
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-success { background: rgba(25, 135, 84, 0.9); }
        .result-danger { background: rgba(220, 53, 69, 0.9); }
        .result-warning { background: rgba(255, 193, 7, 0.9); color: #212529; }

        .result-icon { font-size: clamp(2.75rem, 12vw, 4rem); margin-bottom: 0.5rem; }
        .result-nom { font-size: clamp(1.25rem, 6vw, 1.8rem); font-weight: bold; }
        .result-details { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }

        .heure {
            position: fixed;
            top: 1rem;
            right: 1rem;
            font-size: clamp(1rem, 5vw, 2rem);
            font-weight: bold;
            color: rgba(255,255,255,0.7);
        }

        .date-txt {
            position: fixed;
            top: clamp(2.5rem, 10vw, 4rem);
            right: 1rem;
            max-width: min(90vw, 22rem);
            text-align: right;
            font-size: clamp(0.8rem, 3vw, 1rem);
            color: rgba(255,255,255,0.5);
        }

        .instruction {
            color: rgba(255,255,255,0.6);
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            margin-top: 1rem;
        }

        .scan-box.scanning {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }

        @media (max-width: 575.98px) {
            body {
                justify-content: flex-start;
                padding-top: 5.5rem;
            }

            .logo-container h4 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- Heure en temps réel -->
<div class="heure" id="heure">00:00:00</div>
<div class="date-txt" id="date_txt"></div>

<!-- Logo -->
<div class="logo-container">
    <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo">
    <h4 class="mt-2" style="color: #dc3545;">Centre de Fitness Raguilio</h4>
</div>

<!-- Zone de scan -->
<div class="scan-box" id="scan_box">
    <div class="scan-icon">📷</div>
    <h3>Scannez votre carte</h3>
    <p class="instruction">Présentez votre carte d'abonné devant le lecteur</p>
    <input type="text" id="qr_input" autofocus>
</div>

<!-- Résultat -->
<div class="result-box" id="result_box">
    <div class="result-icon" id="result_icon"></div>
    <div class="result-nom" id="result_nom"></div>
    <div class="result-details" id="result_details"></div>
</div>

<script>
// Heure en temps réel
function majHeure() {
    const now = new Date();
    document.getElementById('heure').textContent =
        now.toLocaleTimeString('fr-FR');
    document.getElementById('date_txt').textContent =
        now.toLocaleDateString('fr-FR', {
            weekday: 'long', year: 'numeric',
            month: 'long', day: 'numeric'
        });
}
setInterval(majHeure, 1000);
majHeure();

// Garder le focus sur le champ de scan
const input = document.getElementById('qr_input');
document.addEventListener('click', () => input.focus());
setInterval(() => input.focus(), 2000);

// Scanner détecte l'entrée (Enter après le scan)
input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const data = this.value.trim();
        if (data) {
            verifierAcces(data);
            this.value = '';
        }
    }
});

function verifierAcces(data) {
    const scanBox = document.getElementById('scan_box');
    scanBox.classList.add('scanning');

    fetch('/controle-acces/verifier', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'qr_data=' + encodeURIComponent(data)
    })
    .then(r => r.json())
    .then(res => {
        scanBox.classList.remove('scanning');
        afficherResultat(res);
    })
    .catch(() => {
        scanBox.classList.remove('scanning');
        afficherResultat({
            statut: 'erreur',
            message: 'Erreur de connexion',
            couleur: 'danger'
        });
    });
}

function afficherResultat(res) {
    const box = document.getElementById('result_box');
    const icon = document.getElementById('result_icon');
    const nom = document.getElementById('result_nom');
    const details = document.getElementById('result_details');

    // Icône selon statut
    const icones = {
        'autorise': '✅',
        'refuse': '❌',
        'attention': '⚠️',
        'erreur': '🚫'
    };

    icon.textContent = icones[res.statut] || '❓';
    nom.textContent = res.message;
    details.textContent = res.details || '';

    // Couleur selon statut
    box.className = 'result-box result-' + res.couleur;
    box.style.display = 'block';

    // Masquer après 4 secondes
    setTimeout(() => {
        box.style.display = 'none';
        input.focus();
    }, 4000);
}
</script>
</body>
</html>
